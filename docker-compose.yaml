services:
  db:
    image: postgres:15-alpine
    container_name: go-chatbot-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: go-chatbot-app
    restart: always
    ports:
      # 8081 no host (8080 costuma estar ocupado por outros serviços locais); a porta interna do app continua 8080
      - "8081:8080"
    env_file:
      - .env
    environment:
      # Sobrescreve o host/porta do banco para usar o nome do serviço no docker
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - sessions_data:/app/data

volumes:
  postgres_data:
  sessions_data: