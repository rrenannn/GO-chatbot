app = "go-chatbot-api"
primary_region = "gru" # São Paulo

[build]

[env]
  SERVER_PORT = "8080"
  ENVIRONMENT = "production"
  DB_SSL_MODE = "require"
  DB_DRIVER = "postgres"

[[mounts]]
  source = "chatbot_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
